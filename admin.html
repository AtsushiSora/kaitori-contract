<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理人ログイン｜オーダーオート</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta
      name="description"
      content="オーダーオート契約作成システムの管理人ログインページです。"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="supabase-config.js"></script>
    <script src="supabase-api.js"></script>
    <script src="admin-auth.js" defer></script>
    <script src="admin.js" defer></script>
  </head>
  <body>
    <header class="site-header" aria-label="サイトヘッダー">
      <a class="brand" href="admin.html" aria-label="オーダーオート 管理画面">
        <span class="brand-mark" aria-hidden="true">
          <img src="assets/logo-mark.png" alt="" />
        </span>
        <span>
          <strong>オーダーオート　管理画面</strong>
          <small>契約作成システム</small>
        </span>
      </a>
      <nav class="nav" aria-label="メインナビゲーション">
        <a href="manual.html">使い方</a>
        <a href="contract.html">契約作成</a>
      </nav>
    </header>

    <main class="page-main admin-main">
      <section class="admin-layout">
        <div class="admin-card">
          <div>
            <p class="eyebrow">Admin</p>
            <h1 id="admin-title">管理人ログイン</h1>
            <p id="admin-copy">
              契約一覧・契約書作成に進むには、管理者パスコードを入力してください。
            </p>
          </div>

          <form id="admin-form" class="admin-form">
            <label id="admin-email-wrap" hidden>
              メールアドレス
              <input
                id="admin-email"
                type="email"
                autocomplete="username"
              />
            </label>
            <label>
              管理者パスコード
              <input
                id="admin-passcode"
                type="password"
                autocomplete="current-password"
                minlength="8"
                required
              />
            </label>
            <label id="admin-confirm-wrap" hidden>
              パスコード確認
              <input
                id="admin-passcode-confirm"
                type="password"
                autocomplete="new-password"
                minlength="8"
              />
            </label>
            <button class="button button-primary" type="submit" id="admin-submit">
              ログイン
            </button>
            <button class="button button-primary test-login-button" type="button" id="test-login">
              テスト用ログイン
            </button>
          </form>

          <p id="admin-message" class="save-status" role="status" aria-live="polite">
            パスコードはこの端末のブラウザ内にハッシュ保存されます。
          </p>

          <p class="test-login-note">
            テスト用ログインは登録なしで入れます。本番前にこのボタンと処理を削除してください。
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <p><strong>オーダーオート　おまかせ廃車</strong></p>
          <p>管理人ログインは端末ごとの保護です。共有端末では作業後にログアウトしてください。</p>
        </div>
        <nav class="footer-links" aria-label="補足ページ">
          <a href="contract.html">契約作成</a>
          <a href="manual.html">使い方</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
